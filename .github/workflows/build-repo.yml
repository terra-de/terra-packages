name: Build Pacman Repo

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    container:
      image: archlinux/archlinux:base-devel

    steps:
      - name: System setup
        run: |
          pacman -Syu --noconfirm git github-cli sudo
          # Mark the workspace as safe for git (checked out on host, used inside container)
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          # Create a non-root builder for makepkg
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect packages to build
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Manual trigger: build all versioned packages
            CHANGED=$(find . -name PKGBUILD -not -path '*-git/*' \
              | sed 's|/PKGBUILD$||' | sed 's|^\./||' | sort -u || true)
          else
            # Push: only build packages whose PKGBUILD changed
            RANGE="HEAD~1..HEAD"
            git rev-parse HEAD~1 >/dev/null 2>&1 \
              || RANGE="$(git rev-list --max-parents=0 HEAD)..HEAD"
            CHANGED=$(git diff --name-only $RANGE -- '**/PKGBUILD' \
              | cut -d/ -f1 | sort -u | grep -v '\-git$' || true)
          fi
          echo "packages=$CHANGED" >> "$GITHUB_OUTPUT"

      - name: Download existing release assets
        if: steps.changes.outputs.packages != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p repo
          gh release download stable --dir repo --skip-existing 2>/dev/null || true

      - name: Build packages
        if: steps.changes.outputs.packages != ''
        run: |
          for pkg in ${{ steps.changes.outputs.packages }}; do
            chown -R builder:builder "$pkg"
            sudo -u builder sh -c "cd '$GITHUB_WORKSPACE/$pkg' && makepkg -f --noconfirm --nodeps"
          done

      - name: Update repo database
        if: steps.changes.outputs.packages != ''
        run: |
          find . -name '*.pkg.tar.zst' -not -path './repo/*' -exec cp {} repo/ \;
          cd repo
          repo-add terra.db.tar.gz *.pkg.tar.zst
          ls -la

      - name: Upload to GitHub Release
        if: steps.changes.outputs.packages != ''
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          artifactErrorsFailBuild: true
          artifacts: "repo/*"
          commit: main
          makeLatest: true
          name: "stable"
          tag: "stable"
          token: ${{ secrets.GITHUB_TOKEN }}
